services:
  # ========================================
  # Aplicación Next.js
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guadiana-objetivos-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    env_file:
      - .env.production
    networks:
      - guadiana-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Labels para Easy Panel
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=guadiana-objetivos"

networks:
  guadiana-network:
    driver: bridge
    name: guadiana-objetivos-network
