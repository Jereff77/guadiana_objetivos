# ========================================
# Configuración de Nginx para Next.js
# ========================================
# Usa esta configuración si deseas usar Nginx como reverse proxy
# frente a la aplicación Next.js en Docker

events {
    worker_connections 1024;
}

http {
    upstream nextjs_app {
        server app:8080;
    }

    server {
        listen 80;
        server_name _;

        # Seguridad
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Límite de tamaño para subida de archivos (evidencias)
        client_max_body_size 50M;

        # Proxy a Next.js
        location / {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts extendidos para operaciones largas
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check
        location /health {
            proxy_pass http://nextjs_app/api/health;
            access_log off;
        }
    }
}
