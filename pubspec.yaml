name: guadiana_app
description: Aplicación móvil de gestión de inventarios con Flutter, Supabase y SQLite (Drift)
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.0.5

  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.15
  path_provider: ^2.0.15
  path: ^1.8.3

  supabase_flutter: ^1.10.25
  supabase: ^1.11.11

  intl: ^0.18.1
  uuid: ^3.0.7
  connectivity_plus: ^5.0.1

  material_design_icons_flutter: ^7.0.7296
  cached_network_image: ^3.2.3

  mobile_scanner: ^3.5.6

  file_picker: ^6.1.1
  open_file: ^3.3.2

  permission_handler: ^11.0.1
  dropdown_search: ^5.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.14.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
